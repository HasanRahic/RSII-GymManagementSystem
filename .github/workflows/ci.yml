name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore backend
        run: dotnet restore backend/Gym.Api/Gym.Api.csproj

      - name: Build backend
        run: dotnet build backend/Gym.Api/Gym.Api.csproj --configuration Release --no-restore

  flutter-analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        working-directory: flutter-mobile
        run: flutter pub get

      - name: Analyze app
        working-directory: flutter-mobile
        run: flutter analyze
