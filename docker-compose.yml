services:

  # ─── SQL Server ────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU16-ubuntu-22.04
    container_name: gym_sqlserver
    environment:
      SA_PASSWORD: "${SQL_SA_PASSWORD:-Admin1234!}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "${SQL_PORT:-1433}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost",
             "-U", "sa", "-P", "${SQL_SA_PASSWORD:-Admin1234!}", "-Q", "SELECT 1",
             "-C", "-b"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13.7-management
    container_name: gym_rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USERNAME:-guest}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD:-guest}"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─── Gym API ───────────────────────────────────────────────────────────────
  gym.api:
    build:
      context: ./backend
      dockerfile: Gym.Api/Dockerfile
    container_name: gym_api
    ports:
      - "${API_HTTP_PORT:-5000}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: >
        Server=sqlserver,1433;Database=${APP_DB_NAME:-220052};
        User Id=sa;Password=${SQL_SA_PASSWORD:-Admin1234!};
        TrustServerCertificate=True;
      JWT__Key: "${JWT_KEY:-GymManagementSystemSuperSecretKey2026!ExtraLongSecretForHmacSha512AlgorithmRequires512Bits!}"
      JWT__Issuer: "${JWT_ISSUER:-GymApi}"
      JWT__Audience: "${JWT_AUDIENCE:-GymClient}"
      JWT__ExpiresInMinutes: "${JWT_EXPIRES_MINUTES:-60}"
      RabbitMQ__Host: "${RABBITMQ_HOST:-rabbitmq}"
      RabbitMQ__Port: "${RABBITMQ_PORT:-5672}"
      RabbitMQ__Username: "${RABBITMQ_USERNAME:-guest}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD:-guest}"
      RabbitMQ__NotificationsQueue: "${RABBITMQ_NOTIFICATIONS_QUEUE:-gym.notifications}"
      Stripe__SecretKey: "${STRIPE_SECRET_KEY:-sk_test_placeholder}"
      Stripe__PublishableKey: "${STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}"
      Stripe__WebhookSecret: "${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  # ─── Gym Notifications ─────────────────────────────────────────────────────
  gym.notifications:
    build:
      context: ./backend
      dockerfile: Gym.Notifications/Dockerfile
    container_name: gym_notifications
    environment:
      DOTNET_ENVIRONMENT: "Production"
      RabbitMQ__Host: "${RABBITMQ_HOST:-rabbitmq}"
      RabbitMQ__Port: "${RABBITMQ_PORT:-5672}"
      RabbitMQ__Username: "${RABBITMQ_USERNAME:-guest}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD:-guest}"
      RabbitMQ__NotificationsQueue: "${RABBITMQ_NOTIFICATIONS_QUEUE:-gym.notifications}"
      SMTP__Host: "${SMTP_HOST:-smtp.gmail.com}"
      SMTP__Port: "${SMTP_PORT:-587}"
      SMTP__Username: "${SMTP_USERNAME:-}"
      SMTP__Password: "${SMTP_PASSWORD:-}"
      SMTP__From: "${SMTP_FROM:-}"
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure

volumes:
  sqlserver_data:
  rabbitmq_data:
